spring.application.name=aldeamo.backend
server.servlet.context-path=/aldeamo
server.port=8080

# Log SQL
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Security
jwt.secret=claveSecretaDe32CaracteresMinimoParaJWT123
jwt.expiration=86400000

# Mysql ? mysql = nombre del servicio en docker-compose
spring.datasource.url=jdbc:mysql://mysql:3306/mydb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Swagger
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.enabled=true